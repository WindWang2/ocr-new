version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend/experiments.db:/app/backend/experiments.db
      - ./camera_images:/app/camera_images
    environment:
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    depends_on:
      - backend
    restart: always

  llama:
    image: ghcr.io/ggerganov/llama.cpp:server-cuda
    ports:
      - "8080:8080"
    volumes:
      - ../2B-new:/models
    command: -m /models/Qwen3.5-2B.Q4_K_M.gguf --mmproj /models/mmproj-BF16.gguf --host 0.0.0.0 --port 8080 -ngl -1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always
